<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="glassesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" /> <!-- Emerald Green -->
      <stop offset="50%" stop-color="#3b82f6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#f43f5e" /> <!-- Rose Pink -->
